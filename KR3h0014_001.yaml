body:
  text: 五代名畫補遺宋劉道醇撰人物門第一神品四人韓求李祝張圖朱瑶韓求一云虬李祝一云柷不知何處人皆倜儻不拘有經略才能屬唐祚陵季遂退藏不仕以丹青自汚而好遊晉唐間時大唐昭宗乾寧乙卯嵗乃封并州節度使李克用為晉王城太原及天祐甲子嵗秋八月梁王朱全忠不軌乃立帝子輝王祝是為哀帝四年夏四月帝禪位于朱全忠時克用隂懷異圖窺伺神器加以左右勸進克用亦懼求祝知之乃命往陜郊畫龍興寺回廊列壁二百餘堵求祝乃對手畫攝摩騰竺法蘭以經來大各八尺洎三門上神數十身皆髙二丈又畫九子母及羅乂變像宛有步武之態由是天下畫流雲集于是莫不鼠伏乃為畫人妬其才識後伺間隙乃從容言於克用曰韓求李祝有文武經術大略今在陜郊畫日久矣辭多不順言大王有異圖時克用方與子存勗畫定大謀忽聞求祝之言慮事泄見害乃矯稱按察境內徑往陜郊臨觀求祝畫壁克用嗟異久之特加慰勞仍命酒張樂以宴求祝克用曰吾方有檜揖松舟之興與子同泛可乎求祝曰諾逮濟中流求祝俱醉克用皆溺之人問其故克用對曰求祝畫之宗師也天下號為第一其神筆精慮散入别境故也時君子太息而語曰懷異志殺善人死無日矣克用尋薨于太原時梁開平二年也可列神品張圖字仲謀河南洛陽人朱梁太祖在藩鎮日圖掌行軍資糧簿籍故時人呼為張將軍圖少頴悟而好丹青及善潑墨山水皆不由師授自致神妙亦不法今古自成一體尤長大像梁龍德中洛陽廣愛寺沙門義暄剩置金幣邀四方竒筆畫三門兩壁時處士跋異號為絶筆乃來應募異方草定畫樣云用朽木描畫圖忽立其後長揖而語曰知跋君敏手固來贊二異方自負乃笑而答曰吾嘗謂畫之聖在吾手筆自餘畫者不得其門而入又安得至于聖乎爾不知跋異之名且顧陸吾曹之友也吾豈須贊二然後為功哉圖亦欣然復曰願繪右壁或不克意則請杇墁之異愈怒乃授朽木大筆於圖圖捧之遂投朽木於地就西壁不暇朽約搦筆揮寫倐忽成折腰報事師者從以三鬼異乃瞪目踧踖驚拱而言曰子豈非張將軍乎圖捉管厲聲曰然異乃雍容而謝曰抑嘗聞將軍之名誠未拜將軍之面適觀神筆刮利信所謂事辭稱其經者也此二壁非異所能也遂引退圖亦不偽讓遂專其功洛陽為之謡言且譏異也語在異評圖乃於東壁畫水神一座直視西壁報事師者其意思髙逺視之如生今並存焉豫又嘗於武宗元第觀圖所畫十王地藏一軸綽有善護慈悲相于今寶藏之可列神品朱瑶字溫琪不知何處人幼學吳道子筆迹由是知名瑶嘗客遊雍洛間時河南府金真觀請瑶畫經相及周廡中門列壁世稱神筆後以歷年浸遠頽阤傾圯索然殆盡今所存者唯三清殿東一壁及長夀院內輪子金剛菩薩等各髙六七尺俗傳昔會節園中鑿移至此深為謬矣妙品四人跋異曹仲元陶守立王仁夀跋異汧陽人眉目踈秀舉止詳雅而性沈厚然善畫佛道鬼神及大像異恃能頗自負抑嘗於廣愛寺為張圖排斥洛陽謡言曰赫赫洛下唯説異畫張氏出頭跋異無價亦有慚色後福先寺請異畫大殿護法善神異方朽約忽一人自稱曰吾姓李滑臺人有名善畫羅漢故鄉里呼吾為李羅漢當與汝對畫角其拙巧以沽名譽異亦默思恐如張圖者遂固讓西壁與之異乃竭精佇思意與筆會屹成一神侍從嚴毅又設色鮮麗此蓋平生之所未能者盡功于是時京洛士人爭來品藻李氏乃縱觀異畫見其精妙入神非己所及遂手足失措時人謡曰李生來跋君怕不意今日却增價不畫羅漢畫駝馬由是異大有得色遂誇吒曰昔見敗於張將軍今取捷於李羅漢李氏深有怍色倐起如厠久而不出人競怪乃往視之李已縊于步簷下矣異遂藁葬于城北之僧園可列妙品曹仲元建康豐城人少學吳生攻畫佛及鬼神仕偽南唐主李璟為待詔仲元凡命意搦管能奪吳生意思時人器之仲元後乃頓棄吳法自立一格而落墨緻細傅彩明澤南州士人咸器重之後璟嘗命仲元畫寶志公石壁冠絶當時故江介逺近佛廟神祠尤多筆迹陶守立池陽人世業儒性明悟有大志少通經史能屬文南唐李璟保大九年春守立程文不利退處齊山禁門却掃屏絶交友偃息蓬蓽琴棋詩酒外以丹青自娛然長於神像鬼神庭院殿閣子女奴𨽻車馬山水靡不精妙亦嘗適興於所居草堂畫山路早行及建康清涼寺浴室門側畫水南州識者莫不欽歎守立嘗畫羅漢一堂為鄉人所得尋獻于偽後主煜遂籍帑府會煜生辰則張於後苑金山水閣以資供養其畫為時所賞如此王仁夀汝南宛人業儒性通敏頗涉文史亦潛心繪畫初學吳生長於佛像鬼神及馬等仁夀嘗於京師大相國寺淨土院大殿前畫八菩薩今見存焉耆舊傳云是吳道子筆其精緻如此晉出帝開運二年春正月契丹偽天皇王耶律德光以兵犯闕時仁夀及焦著王靄並為德光掠歸至我太祖至明大孝皇帝受禪享御首遣驛使索仁夀等時狄人方聽命本朝會仁夀及著考終命獨放王靄歸國仁夀有子士元最知名可列妙品能品二人竹夢松陸晃竹夢松建康溧陽人亦潛心圖畫長於人物子女洎宫殿景致仕偽南唐主李璟為東川别駕豫嘗於判太原府侍郎王公第見夢松畫春景士女一軸上有璟偽合同印及集賢院印記並存焉其布景命意綽約體態宛得周昉之格陸晃嘉禾人性踈逸不修人事好交尚氣每沈湎于酒亦善丹雘多畫村野人物凡酒興情逸遇筆揮灑出於臨時略不預構故妍醜互出或在絶格或入末品時偽南唐李璟常聞晃名欲召之會侍者譖之以謂晃好把酒歌舞無臣子之體璟由是踈逺之山水門第二神品二人荆浩關同荆浩字浩然河南沁水人業儒博通經史善屬文偶五季多故遂退藏不仕乃隱于太行之洪谷自號洪谷子嘗畫山水樹石以自適時鄴都青蓮寺沙門大愚嘗乞畫于浩寄詩以達其意曰大幅故牢健知君恣筆蹤不求千澗水止要兩株松樹下留盤石天邊縱逺峯近嵓幽濕處惟藉墨煙濃後浩亦畫山水圖以貽大愚仍以詩答之曰恣意縱橫掃峯巒次第成筆尖寒樹瘦墨淡野雲輕嵓石噴泉窄山根到水平禪房時一展兼稱苦空情浩著山水訣一卷為友人投進之至今藏之書府亦嘗於京師雙林院畫寶陀落伽山觀自在菩薩一壁豫嘗於供奉李公第觀浩山水一軸雖前輩未易過也門生關同最知名關同不知何許人初師荆浩學山水同刻意力學寢食都廢意欲逾浩後俗諺曰關家山水時四方輻湊爭求筆迹其山中人物惟求安定胡氏添畫耳或曰胡翼且同之畫也上突巍峯下瞰窮谷卓爾峭拔者同能一筆而成其竦擢之狀突如涌出而又峯巖蒼翠林麓土石加以地里平逺磴道邈絶橋彴村堡杳漠皆備故當時推尚之走獸門第三神品二人胡瓌東丹王胡瓌山後契丹人或云瓌本慎州烏索固部落人善畫蕃馬骨格體狀富於精神其於穹廬部族帳幕旗斾弧矢鞍韉或隨水草放牧或在馳逐弋獵而又胡天慘冽沙磧平逺能曲盡塞外不毛之景趣信當時之神巧絶代之精技歟故人至于今稱之豫觀瓌之畫凡握筆落墨細入毫芒而器度精神富有筋骨然纎微精緻未有如瓌之比者也東丹王贊華契丹大姓乃耶律德光之外戚善畫馬之權竒者梁唐及晉初凡北邊防戍及榷易商人嘗得贊華之畫工甚精緻至京師人多以金帛質之豫於贊善大夫趙公第見贊華畫馬骨法徑快不良不駑自得窮荒步驟之態其所短者設色粗略人物短小此其失也花竹翎毛門第四神品二人鍾隱郭權輝鍾隱字晦叔天台人少清悟不嬰俗事好肥遁自處嘗卜居間曠結茅室以養恬和之氣亦好畫花竹禽鳥以自娛凡舉筆寫像必致精絶時無倫擬者尤喜畫鷂子白頭翁鶡鳥班鳩皆有生態尤長草棘樹木其畫在江南者悉為南唐李煜所有煜親筆題署及以偽璽印之升元中齊安張校尉得隱畫鶡鳥二軸張之賔次時金昌宗題詩曰為厭翻翔下葦叢戢翰側腦思何窮侍童莫便褰簾過只恐驚飛入碧空其為人珍賞之多此類門生郭權輝亦有能名郭權輝北海營丘人俗呼郭將軍世為山東右姓初師天台鍾隱攻畫飛走像權輝亦常於别墅特構一第止畜禽鳥等權輝每澄思滌慮縱玩于其間故凡舉意肆筆率得其真豫嘗於武宗元及富商髙氏第見權輝畫架上鷂子二軸精妙入神故今之人呼為郭將軍鷂子及善布野景草木為今昔所貴妙品一人施璘施璘字仲寶京兆藍田人善畫生竹為當時絶技豫嘗觀璘畫十幅竹圖凡老根薄石笋枝附籜扶踈交映青翠滿庭宛得三湘髙秋之野色故後周起居郎韋重遇留題曰枯籜危根繳石頭千竿交映近清流堪珍仲寶窮幽筆留得荆湘一片秋能品一人丁謙丁謙晉陵義興人始師蕭説雜畫後專寫生竹時號第一豫嘗覽謙畫倒崖及病竹筆法快利根瘦節縮誠得危挂雕瘁之狀可列能品屋木門第五神品一人衛賢能品一人何遇衛賢京兆人仕南唐為內供奉初師尹繼昭後刻苦不倦執學吳生長於樓觀殿宇盤車水磨於時見稱豫嘗於富商髙氏家觀賢畫盤車水磨圖及故大丞相文懿張公第有春江釣叟圖上有南唐李煜金索書漁父詞二首其一曰閬苑有情千里雪桃李無言一隊春一壺酒一竿身快活如儂有幾人其二曰一棹春風一葉舟一輪繭縷一輕鈎花滿渚酒盈甌萬頃波中得自由何遇河南長水人善畫宫室池閣竊慕衛賢筆法故聲華大振尤善山水樹石為當時所稱其間人物則假手於人可列能品塑作門第六神品三人內裝鸞一人附楊惠之劉九郎王溫楊惠之不知何處人唐開元中與吳道子同師張僧繇筆迹號為畫友巧藝並著而道子聲光獨顯惠之遂都焚筆硯毅然發忿專肆塑作能奪僧繇畫相乃與道子爭衡時人語曰道子畫惠之塑奪得僧繇神筆路其為人稱歎也如此惠之嘗於京兆府長樂鄉北太華觀塑玉皇尊像及汴州安業寺淨土院大殿內佛像睿宗延和元年七月二十七日改為大相國寺及枝條千佛東經藏院殿後三門二神當殿維摩居士像又於河南府廣愛寺三門上五百羅漢及山亭院楞伽山皆惠之塑也先是惠之將塑楞伽山也乃為大義淨三藏呪其土故至于今跂行喙息蠉飛蠕動物及飛禽悉不敢至山所其精絶殊聖古無倫比逮唐末廣政中寃句人黃巢賊亂京洛焚燎寺宇幾盡矣惟惠之手迹惜其神妙率不殘毁故楞伽山亭凡留題詩板近逾百首竟為判西京留守刑部侍郎朝直諒悉剗去之今存者止三首爾其一成紀李琪題曰善髙天外逺方丈海中遙自有山神護應無劫火燒壞文侵古壁飛劒出寒霄何以蒼蒼色嚴粧十七朝其二洛陽首座沙門淨顯曰靈異不能栖鳥雀幽竒終不著猿猱為經巢賊應無損縱使秦驅也謾勞珍重昔賢留像迹陵遷谷變自堅牢本失二句且惠之之塑抑合相術故為今古絶技惠之嘗於京兆府塑倡優人留杯亭像成之日惠之亦手􅑽染之遂於市會中面牆而置之京兆人視其背皆曰此留杯亭也其神巧多此類後著塑訣一卷行于世劉九郎失其名不知何許人也嘗於河南府南宫大殿塑三清大帝尊像及門外青龍白虎洎守殿等神稱為神巧時廣愛寺東法華院主惠月聞九郎名乃請塑九子母後工畢聲動天下惠月乃以五百緡酬之九郎得之不委謝而去又於長夀寺大殿中塑卧孩兒一京邑士人無不欽歎或人稱曰廣愛寺九子母乃劉君技之絶者也九郎乃唍爾言曰吾之所塑九子母者三今豳者第一陜郊者第二廣愛者第三焉得謂之絶時人歎其精致王溫不知何處人善􅑽鸞彩畫其精功妙技為古今絶手先是有唐中宗大和昭孝皇帝神龍二年丙午歲有汴州安業寺沙門惠雲唐之汴州宣武軍節度即今京師也安業寺即今大相國寺也往濮陽成寺得彌勒瑞像樣髙一丈八尺後歸寺鑄成欲於安業寺安置失鑄人姓名也乃為本寺僧衆嫉而拒之惠雲乃於安業寺東偏别營建國寺而安之睿宗興孝皇帝延和初建國寺被毁其像將遷入安業有瑞光會官吏敷奏尋敕改建國寺為大相國寺後賜御書額乃省安業寺屬焉則今之京師左街大相國寺是也惠雲鑄成金像時為本寺僧衆嫉其能而不許安置惠雲遂以囊篋所有乃貿歙州司馬鄭景之第安置洎掘地得碑乃北齊文宣皇帝天保二年辛未嵗置建國寺也時為採訪使韋嗣立知之仍復命為建國寺俾惠雲主之實嗣立命也建國寺今藥師院是也延和元年壬子嵗王志愔為汴州採訪使奉詔毁拆治內無額祠廟建國寺尋被毁拆其金像為安業寺所遷時具萬夫衆力不能少動而佛面現白毫金相瑞光上燭于天時王志愔郎中賀蘭務溫録事焦立功具實聞奏尋準前制改故建國寺為大相國寺仍併安業寺而屬焉至玄宗至道皇帝先天元年即位乃尊睿宗為太上皇是年十月二十五日太上皇乃手書大相國寺額賜焉今大相國寺是也今寺額乃本朝太宗皇帝御書也寺之大殿彌勒瑞像則惠雲所鑄者也其金像彩畫則溫所􅑽者也洎觀其金像彩畫聖容能具種種大慈大悲端嚴相好誠得當來下生善現救護之意又觀頭上肉髻髮紺琉璃色於身圓光中有千萬億堅束迦寶以奉莊嚴則溫之功不可謂不至矣識者曰夫􅑽鸞塑像之羽翼是即是矣故得預十絶之一而勒于寺之碑者正謂是也今大相國寺有十絶碑其略曰一大殿金􅑽聖容金粉面肉色并三門下善神一對匠人王溫是一絶也雕木門第七神品一人伎巧夫人嚴氏伎巧夫人嚴氏乃沙門藴能妹也形質枯瘁鼻多長毛而性開逹明悟恭肅柔和尤好佛陀大教及善鼓琴亦能雕木後隨兄藴能居餘杭嘗得檀香木大不盈尺夫人乃刻作瑞蓮山龕門雕成細真珠八花毬露重網然後透刀刻成五百羅漢衆像其形相侍從一一互出皆慈覺法相時郡將給事中馬公聞之乃令健步索而觀之馬公一見驚其神巧遂露章貢于章聖皇帝上目之嘉歎移刻乃賜金帛有差仍命嚴氏為使巧夫人其為上旌寵也如此五代名畫補遺
