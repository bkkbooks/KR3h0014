body:
  text: 五代名畫補遺目録藝術類一書畫之屬人物門第一神品四人韓求李祝張圖朱瑶妙品四人跋異曹仲元陶守立王仁壽能品二人竹夢松陸晃山水門第二神品二人荆浩關同走獸門第三神品二人胡瓌東丹王花竹翎毛門第四神品二人鍾隱郭權輝妙品一人施璘能品一人丁謙屋木門第五神品一人衛賢能品一人何遇塑作門第六神品三人內裝鸞一人附楊惠之劉九郎王溫雕木門第七神品一人伎巧夫人嚴氏臣等謹按五代名畫補遺一卷宋劉道醇撰考朝公武讀書志曰五代名畫補遺一卷皇朝劉道成纂符嘉應撰序云胡嶠嘗作梁朝名畫録因廣之故曰補遺又别載宋朝名畫評三卷亦注劉道成纂符嘉應序其名皆作劉道成與此不合陳振孫書録解題曰五代名畫記一卷劉道醇撰嘉祐四年陳洵直序其書名又作名畫記與此本亦異然此本為毛晉汲古閣影摹宋刻楮墨精好纎毫無缺不應卷首書名人名乃皆作訛字蓋本此一書振孫誤題書名公武誤題人名馬端臨作文獻通考又偶未見其書但據兩家之書目遂重載之觀卷首陳洵直序與振孫所言合而公武所載符嘉應序又即洵直序中語知公武併以宋朝名畫評序誤注此條之下不但成字之訛也胡嶠名見五代史契丹傳所謂梁朝名畫録者今已不傳道醇據書録解題稱為大梁人其始末無考所作宋朝名畫評中句龍爽一條稱神宗時為圖畫院祇候則是書先成于仁宗時宋朝名畫評又成于哲宗時矣書中所録五代畫手僅二十有四人蓋掇拾胡嶠所遺見于嶠録者此不復載故也乾隆四十一年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀五代名畫補遺原序蒙嘗聞成紀李嗣真之畫品吳郡朱景元之畫斷皆採摘古今畫家名氏叢而録之以廣其傳故五代名流抑多遺闕則有若國初監察御史胡嶠遂採擷遺孑紀于編帙始自尹繼昭終於劉永總四十三人名之曰廣梁朝名畫目夫紀述雖備闕墜尚多譬拔毫捨翰刈薪棄楚嗚呼自唐祚陵季五代脆促自朱梁至于柴周凡一十四主計五十四年而又日尋干戈轉戰不暇雖義夫哲婦忠臣孝子猶多漏略况於畫人哉我大宋撫重熙之運博全盛之化祖功宗德四葉于茲誠萬世綿綿之盛在于今日矣故哲夫賢士坐談王道徒歌帝力而豫抑嘗語及五朝名畫盡可屈指吁生遘洶洶之運歿垂丹青之譽而云云藉藉見談于盛明之世獲在於齒牙之論良用惜哉今因集本朝名畫評又捃拾其見遺者敘而編之名曰五代名畫補遺其門品上下一如聖朝名畫評之例類仍附之於後者亦明我聖朝文事之載郁云時嘉祐四年十二月初九日潁川陳洵直序
